<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Copilot SDK - Studio + Recorder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; height: 100vh; overflow: hidden; }

    .app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
    .toolbar {
      padding: 10px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }
    .toolbar h1 { font-size: 16px; color: #58a6ff; white-space: nowrap; }
    .toolbar select, .toolbar .tb-btn {
      padding: 6px 12px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .toolbar .tb-btn:hover { background: #30363d; }
    .toolbar .spacer { flex: 1; }
    .toolbar .status { font-size: 12px; color: #8b949e; }
    .toolbar .status .done { color: #3fb950; }

    /* Play all toggle */
    .tb-play {
      background: #238636 !important;
      border-color: #238636 !important;
      color: white !important;
      font-weight: 600;
      min-width: 110px;
      text-align: center;
    }
    .tb-play:hover { background: #2ea043 !important; }
    .tb-play.playing {
      background: #d29922 !important;
      border-color: #d29922 !important;
    }

    .content { display: grid; grid-template-columns: 1fr 420px; overflow: hidden; }

    .preview-panel { display: flex; flex-direction: column; background: #0d1117; overflow: hidden; }
    .preview-panel iframe { flex: 1; border: none; width: 100%; height: 100%; }

    .recorder-panel { border-left: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; }
    .slides-list { flex: 1; overflow-y: auto; padding: 12px; }

    .slide {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .slide.active { border-color: #58a6ff; }
    .slide.has-custom { border-left: 3px solid #3fb950; }
    .slide.is-recording { border-color: #f85149; box-shadow: 0 0 12px rgba(248,81,73,0.3); }
    .slide.is-playing { border-color: #238636; box-shadow: 0 0 8px rgba(35,134,54,0.3); }

    .slide-header {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }
    .slide-header:hover { background: #1c2129; }
    .slide-num { font-size: 13px; font-weight: 700; color: #8b949e; min-width: 28px; }
    .slide-title { font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .slide-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
    .badge-title { background: #58a6ff22; color: #58a6ff; }
    .badge-ending { background: #a371f722; color: #a371f7; }
    .badge-code { background: #3fb95022; color: #3fb950; }
    .badge-recorded { background: #3fb95022; color: #3fb950; }
    .slide-dur { font-size: 11px; color: #484f58; }

    .slide-body { padding: 0 14px 12px; display: none; }
    .slide.expanded .slide-body { display: block; }

    .narration {
      font-size: 12px; line-height: 1.6; color: #c9d1d9;
      background: #0d1117; padding: 10px 12px; border-radius: 6px;
      margin-bottom: 10px; border-left: 3px solid #58a6ff;
    }
    .code-preview {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 11px; color: #8b949e; background: #0d1117;
      padding: 8px 10px; border-radius: 6px;
      max-height: 80px; overflow-y: auto; white-space: pre; margin-bottom: 10px;
    }
    .rec-controls { display: flex; gap: 6px; }
    .btn {
      padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer;
      font-size: 12px; font-weight: 600; display: flex; align-items: center;
      gap: 4px; transition: all 0.15s; flex: 1; justify-content: center;
    }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-rec { background: #f85149; color: white; }
    .btn-rec:hover:not(:disabled) { background: #da3633; }
    .btn-rec.recording { animation: pulse 1s infinite; background: #da3633; }
    .btn-stop { background: #d29922; color: white; }
    .btn-play { background: #238636; color: white; }
    .btn-play.playing { background: #d29922; color: white; }
    .btn-play:hover:not(:disabled) { background: #2ea043; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(248,81,73,0.5); }
      50% { box-shadow: 0 0 0 6px rgba(248,81,73,0); }
    }

    .key-hint {
      padding: 8px 14px; background: #161b22; border-top: 1px solid #30363d;
      font-size: 11px; color: #484f58; text-align: center;
    }
    kbd { background: #21262d; border: 1px solid #30363d; border-radius: 3px; padding: 1px 5px; font-size: 11px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <h1>Studio + Recorder</h1>
      <select id="demoSelect"></select>
      <button class="tb-btn tb-play" id="playAllBtn" onclick="togglePlayAll()">Play All</button>
      <button class="tb-btn" id="syncBtn" onclick="syncDurations()">Re-sync</button>
      <div class="spacer"></div>
      <div class="status" id="statusText"></div>
    </div>
    <div class="content">
      <div class="preview-panel">
        <iframe id="remotionFrame"></iframe>
      </div>
      <div class="recorder-panel">
        <div class="slides-list" id="slidesList"></div>
        <div class="key-hint">
          <kbd>R</kbd> Record/Stop &nbsp;
          <kbd>Space</kbd> Play/Stop &nbsp;
          <kbd>P</kbd> Play All &nbsp;
          <kbd>&uarr;</kbd><kbd>&darr;</kbd> Navigate
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = location.origin;
    const REMOTION_URL = 'http://localhost:__REMOTION_PORT__';
    const DEMOS_DIR = '__DEMOS_DIR__';
    let currentDemo = null;
    let manifest = null;
    let activeSlideIdx = 0;
    let mediaRecorder = null;
    let recordingIdx = null;
    let chunks = [];

    // Audio playback state
    let currentAudio = null;
    let playingSlideIdx = null;
    let playAllMode = false;
    let playAllAbort = false;

    // ── Demo loading ──────────────────────────────────────────────
    async function loadDemos() {
      document.getElementById('remotionFrame').src = REMOTION_URL;
      const res = await fetch(`${API}/api/demos`);
      const demos = await res.json();
      const sel = document.getElementById('demoSelect');
      demos.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d.replace('demo0', 'Demo 0').replace('demo', 'Demo ');
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => {
        stopAllAudio();
        loadDemo(sel.value);
      });
      if (demos.length) loadDemo(demos[0]);
    }

    async function loadDemo(demoId) {
      currentDemo = demoId;
      const res = await fetch(`${API}/api/manifest/${demoId}`);
      manifest = await res.json();
      activeSlideIdx = 0;

      // Always use Main composition (loads fast, has timeline)
      const iframe = document.getElementById('remotionFrame');
      if (!iframe.src || !iframe.src.includes('localhost')) {
        iframe.src = `${REMOTION_URL}/?composition=Main`;
      }

      await renderSlides();
    }

    async function renderSlides() {
      const list = document.getElementById('slidesList');
      list.innerHTML = '';
      let recorded = 0;

      for (let i = 0; i < manifest.slides.length; i++) {
        const s = manifest.slides[i];
        const hasCustom = await checkAudioExists(s.audioFile);
        if (hasCustom) recorded++;

        let code = '';
        try {
          const r = await fetch(`${API}/api/slide/${currentDemo}/${s.file}`);
          if (r.ok) code = await r.text();
        } catch {}

        const isPlaying = playingSlideIdx === i;
        const div = document.createElement('div');
        div.className = `slide${i === activeSlideIdx ? ' expanded active' : ''}${hasCustom ? ' has-custom' : ''}${isPlaying ? ' is-playing' : ''}`;
        div.id = `slide-${i}`;
        div.innerHTML = `
          <div class="slide-header" onclick="toggleSlide(${i})">
            <span class="slide-num">${i + 1}</span>
            <span class="slide-title">${escapeHtml(s.cardData?.title || s.narrationText?.substring(0, 50) || s.file)}</span>
            <span class="slide-badge badge-${s.type}">${s.type}</span>
            ${hasCustom ? '<span class="slide-badge badge-recorded">REC</span>' : ''}
            <span class="slide-dur">${(s.durationFrames / 30).toFixed(1)}s</span>
          </div>
          <div class="slide-body">
            <div class="narration">${escapeHtml(s.narrationText || '(no script)')}</div>
            ${code ? `<div class="code-preview">${escapeHtml(code)}</div>` : ''}
            <div class="rec-controls">
              <button class="btn btn-rec" id="rec-${i}" onclick="toggleRecord(${i})">Record</button>
              <button class="btn btn-play${isPlaying ? ' playing' : ''}" id="play-${i}" onclick="togglePlaySlide(${i})" ${hasCustom ? '' : 'disabled'}>
                ${isPlaying ? 'Stop' : 'Play'}
              </button>
            </div>
          </div>
        `;
        list.appendChild(div);
      }

      document.getElementById('statusText').innerHTML =
        `<span class="done">${recorded}</span>/${manifest.slides.length} recorded`;
    }

    async function checkAudioExists(audioFile) {
      try {
        const r = await fetch(`${API}/api/audio-exists/${currentDemo}/${audioFile}`);
        const d = await r.json();
        return d.exists;
      } catch { return false; }
    }

    function toggleSlide(idx) {
      const prev = document.getElementById(`slide-${activeSlideIdx}`);
      if (prev) prev.classList.remove('expanded', 'active');
      activeSlideIdx = idx;
      const curr = document.getElementById(`slide-${idx}`);
      if (curr) { curr.classList.add('expanded', 'active'); curr.scrollIntoView({ block: 'nearest' }); }
    }

    // ── Single slide play/stop toggle ─────────────────────────────
    function togglePlaySlide(idx) {
      if (playingSlideIdx === idx) {
        stopAllAudio();
      } else {
        stopAllAudio();
        playSingleSlide(idx);
      }
    }

    function playSingleSlide(idx) {
      const file = manifest.slides[idx].audioFile;
      currentAudio = new Audio(`${API}/audio/${currentDemo}/${file}`);
      playingSlideIdx = idx;

      // Highlight
      const card = document.getElementById(`slide-${idx}`);
      if (card) card.classList.add('is-playing');
      const btn = document.getElementById(`play-${idx}`);
      if (btn) { btn.textContent = 'Stop'; btn.classList.add('playing'); }

      currentAudio.onended = () => {
        clearPlayingState(idx);
        playingSlideIdx = null;
        currentAudio = null;

        // If in play-all mode, advance to next
        if (playAllMode && !playAllAbort) {
          const next = idx + 1;
          if (next < manifest.slides.length) {
            toggleSlide(next);
            playSingleSlide(next);
          } else {
            stopPlayAll();
          }
        }
      };

      currentAudio.onerror = () => {
        clearPlayingState(idx);
        playingSlideIdx = null;
        currentAudio = null;
        if (playAllMode && !playAllAbort) {
          // Skip slides with no audio
          const next = idx + 1;
          if (next < manifest.slides.length) {
            toggleSlide(next);
            playSingleSlide(next);
          } else {
            stopPlayAll();
          }
        }
      };

      currentAudio.play().catch(() => {
        clearPlayingState(idx);
        playingSlideIdx = null;
        currentAudio = null;
      });
    }

    function clearPlayingState(idx) {
      const card = document.getElementById(`slide-${idx}`);
      if (card) card.classList.remove('is-playing');
      const btn = document.getElementById(`play-${idx}`);
      if (btn) { btn.textContent = 'Play'; btn.classList.remove('playing'); }
    }

    function stopAllAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
      }
      if (playingSlideIdx !== null) {
        clearPlayingState(playingSlideIdx);
        playingSlideIdx = null;
      }
      if (playAllMode) {
        stopPlayAll();
      }
    }

    // ── Play All toggle ───────────────────────────────────────────
    function togglePlayAll() {
      if (playAllMode) {
        stopAllAudio();
      } else {
        startPlayAll();
      }
    }

    function startPlayAll() {
      playAllMode = true;
      playAllAbort = false;
      const btn = document.getElementById('playAllBtn');
      btn.textContent = 'Stop All';
      btn.classList.add('playing');

      // Start from current slide
      toggleSlide(activeSlideIdx);
      playSingleSlide(activeSlideIdx);
    }

    function stopPlayAll() {
      playAllMode = false;
      playAllAbort = true;
      const btn = document.getElementById('playAllBtn');
      btn.textContent = 'Play All';
      btn.classList.remove('playing');
    }

    // ── Recording ─────────────────────────────────────────────────
    async function toggleRecord(idx) {
      if (recordingIdx !== null) {
        stopRecording();
        return;
      }
      stopAllAudio(); // stop playback before recording
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
        chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(chunks, { type: 'audio/webm' });
          const slideName = manifest.slides[idx].audioFile.replace('.mp3', '');
          await fetch(`${API}/api/upload/${currentDemo}/${slideName}`, { method: 'POST', body: blob });
          const syncRes = await fetch(`${API}/api/resync/${currentDemo}`, { method: 'POST' });
          const syncData = await syncRes.json();
          recordingIdx = null;

          // Reload manifest but keep position
          const prevIdx = activeSlideIdx;
          const r = await fetch(`${API}/api/manifest/${currentDemo}`);
          manifest = await r.json();
          activeSlideIdx = prevIdx;
          await renderSlides();
          toggleSlide(prevIdx);

          // Reload Remotion preview to pick up new duration
          if (syncData.changed) reloadPreview();
        };
        mediaRecorder.start();
        recordingIdx = idx;

        const btn = document.getElementById(`rec-${idx}`);
        btn.textContent = 'Stop';
        btn.className = 'btn btn-stop';
        document.getElementById(`slide-${idx}`).classList.add('is-recording');
      } catch (err) {
        alert('Mic access denied: ' + err.message);
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
      const idx = recordingIdx;
      if (idx !== null) {
        const btn = document.getElementById(`rec-${idx}`);
        if (btn) { btn.textContent = 'Record'; btn.className = 'btn btn-rec'; }
        const card = document.getElementById(`slide-${idx}`);
        if (card) card.classList.remove('is-recording');
      }
    }

    // ── Resync ────────────────────────────────────────────────────
    async function syncDurations() {
      const btn = document.getElementById('syncBtn');
      btn.textContent = 'Syncing...';
      btn.disabled = true;
      try {
        const res = await fetch(`${API}/api/resync/${currentDemo}`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          btn.textContent = data.changed ? `Done (${data.totalSeconds}s)` : 'In sync';
          // Reload manifest
          const r = await fetch(`${API}/api/manifest/${currentDemo}`);
          manifest = await r.json();
          await renderSlides();
          // Reload Remotion preview so it picks up new durations
          if (data.changed) reloadPreview();
        } else {
          btn.textContent = 'Error';
        }
      } catch {
        btn.textContent = 'Error';
      }
      setTimeout(() => { btn.textContent = 'Re-sync'; btn.disabled = false; }, 2000);
    }

    function reloadPreview() {
      const iframe = document.getElementById('remotionFrame');
      iframe.src = `${REMOTION_URL}/?composition=Main`;
    }

    // ── Keyboard shortcuts ────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      if (e.key === 'r' || e.key === 'R') {
        e.preventDefault();
        if (recordingIdx !== null) stopRecording();
        else toggleRecord(activeSlideIdx);
      }
      if (e.key === ' ') {
        e.preventDefault();
        togglePlaySlide(activeSlideIdx);
      }
      if (e.key === 'p' || e.key === 'P') {
        e.preventDefault();
        togglePlayAll();
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (activeSlideIdx < manifest.slides.length - 1) toggleSlide(activeSlideIdx + 1);
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (activeSlideIdx > 0) toggleSlide(activeSlideIdx - 1);
      }
      if (e.key === 'Escape') {
        e.preventDefault();
        stopAllAudio();
        if (recordingIdx !== null) stopRecording();
      }
    });

    function escapeHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadDemos();
  </script>
</body>
</html>
